version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: forgeq-postgres-container
    environment:
      - POSTGRES_DB=forgeq
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: forgeq-redis-container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
